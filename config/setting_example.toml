[global]
# API authentication key
api_key = "han1234"
# Admin panel username
admin_username = "admin"
# Admin panel password (change immediately after first login)
admin_password = "admin"

[flow]
# Google Flow Labs base URL
labs_base_url = "https://labs.google/fx/api"
# Google API base URL
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
# Request timeout in seconds
timeout = 120
# Maximum number of retries for failed requests
max_retries = 3
# Image request timeout in seconds
image_request_timeout = 40
# Number of retries on image timeout
image_timeout_retry_count = 1
# Delay between image timeout retries (seconds)
image_timeout_retry_delay = 0.8
# Use media proxy fallback on image timeout
image_timeout_use_media_proxy_fallback = true
# Prefer media proxy for image requests
image_prefer_media_proxy = false
# Maximum wait time for image slot availability (seconds)
image_slot_wait_timeout = 480
# Soft limit for concurrent image launches
image_launch_soft_limit = 20
# Wait timeout for image launch (seconds)
image_launch_wait_timeout = 480
# Stagger delay between image launches (milliseconds)
image_launch_stagger_ms = 0
# Maximum wait time for video slot availability (seconds)
video_slot_wait_timeout = 480
# Soft limit for concurrent video launches
video_launch_soft_limit = 20
# Wait timeout for video launch (seconds)
video_launch_wait_timeout = 480
# Stagger delay between video launches (milliseconds)
video_launch_stagger_ms = 0
# Polling interval for checking generation status (seconds)
poll_interval = 3.0
# Maximum number of polling attempts
max_poll_attempts = 200

[server]
# Server bind address
host = "0.0.0.0"
# Server port
port = 8000

[debug]
# Enable debug mode
enabled = false
# Log all incoming requests
log_requests = true
# Log all outgoing responses
log_responses = true
# Mask tokens in logs
mask_token = true

[proxy]
# Enable proxy for requests
proxy_enabled = false
# Proxy URL (e.g., http://proxy:port or socks5://proxy:port)
proxy_url = ""

[generation]
# Image generation timeout (seconds)
image_timeout = 300
# Video generation timeout (seconds)
video_timeout = 1500

[admin]
# Error ban threshold - ban users after this many consecutive errors
error_ban_threshold = 3

[cache]
# Enable file caching for generated content
enabled = false
# Cache timeout in seconds (default 2 hours). Set to 0 for no auto-expiry
timeout = 7200
# Base URL for cached file access. Leave empty to use server address
base_url = ""

[captcha]
# Captcha solving method: yescaptcha/browser/personal/remote_browser
captcha_method = "browser"
# Additional wait time after captcha reload/clear (seconds)
browser_recaptcha_settle_seconds = 3.0
# YesCaptcha API key
yescaptcha_api_key = ""
# YesCaptcha API base URL
yescaptcha_base_url = "https://api.yescaptcha.com"
# Remote browser captcha service URL
remote_browser_base_url = ""
# Remote browser captcha service API key
remote_browser_api_key = ""
# Remote browser captcha request timeout (seconds)
remote_browser_timeout = 60
